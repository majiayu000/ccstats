  <g class="display" font-size="19" font-weight="650" letter-spacing="0">
    <rect x="76" y="328" width="178" height="44" rx="10" fill="#0a1c20" fill-opacity="0.82" stroke="#58e2f4" stroke-opacity="0.32"/>
