<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="leftShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#02080b" stop-opacity="0.95"/>
      <stop offset="0.46" stop-color="#02080b" stop-opacity="0.72"/>
      <stop offset="0.78" stop-color="#02080b" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#02080b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bottomShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#02080b" stop-opacity="0"/>
      <stop offset="1" stop-color="#02080b" stop-opacity="0.62"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <style>
      .display {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      }
      .mono {
        font-family: "SF Mono", Menlo, Consolas, monospace;
      }
    </style>
  </defs>

  <rect width="1200" height="630" fill="#02080b"/>
  <image href="readme-card-background.png" x="0" y="0" width="1200" height="630" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1200" height="630" fill="url(#leftShade)"/>
  <rect width="1200" height="630" fill="url(#bottomShade)"/>
  <rect x="16" y="16" width="1168" height="598" rx="26" fill="none" stroke="#5ee6ff" stroke-opacity="0.18"/>
  <rect x="52" y="54" width="682" height="522" rx="22" fill="#02080b" fill-opacity="0.84" stroke="#5ee6ff" stroke-opacity="0.18"/>

  <g filter="url(#softShadow)">
    <image href="final/icon.svg" x="82" y="80" width="104" height="104"/>
    <text class="display" x="210" y="154" fill="#f5fbff" font-size="92" font-weight="780" letter-spacing="0">ccstats</text>
    <text class="display" x="84" y="252" fill="#eefcff" font-size="42" font-weight="680" letter-spacing="0">
      AI coding usage analytics
    </text>
    <text class="display" x="86" y="304" fill="#b7d8dc" font-size="28" font-weight="520" letter-spacing="0">
      Token counts, model costs, sessions, projects, trends
    </text>
    <text class="mono" x="88" y="354" fill="#7de9f5" font-size="26" font-weight="650" letter-spacing="0">
      Claude Code + OpenAI Codex logs
    </text>
  </g>

  <g class="display" font-size="19" font-weight="650" letter-spacing="0">
    <rect x="84" y="392" width="172" height="48" rx="10" fill="#0a1c20" fill-opacity="0.90" stroke="#58e2f4" stroke-opacity="0.42"/>
    <text x="109" y="423" fill="#e9fbff">Daily trends</text>
    <rect x="272" y="392" width="184" height="48" rx="10" fill="#0d2018" fill-opacity="0.90" stroke="#6ef59a" stroke-opacity="0.36"/>
    <text x="297" y="423" fill="#f0fff5">Session stats</text>
    <rect x="472" y="392" width="202" height="48" rx="10" fill="#241d0d" fill-opacity="0.90" stroke="#ffd766" stroke-opacity="0.38"/>
    <text x="497" y="423" fill="#fff7dc">Cost tracking</text>
  </g>

  <g transform="translate(84 474)">
    <rect width="596" height="70" rx="14" fill="#041014" fill-opacity="0.92" stroke="#62e7f7" stroke-opacity="0.30"/>
    <circle cx="28" cy="28" r="6" fill="#ffca63"/>
    <circle cx="50" cy="28" r="6" fill="#5cf38e"/>
    <circle cx="72" cy="28" r="6" fill="#61e7ff"/>
    <text class="mono" x="104" y="42" fill="#eafcff" font-size="24" font-weight="600" letter-spacing="0">ccstats codex today -b</text>
  </g>
