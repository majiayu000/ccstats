    <text class="display" x="188" y="132" fill="#f5fbff" font-size="78" font-weight="750" letter-spacing="0">ccstats</text>
    <text class="display" x="76" y="224" fill="#d9f3f5" font-size="34" font-weight="560" letter-spacing="0">
      Token and cost analytics for AI coding logs
    </text>
    <text class="mono" x="78" y="273" fill="#7de9f5" font-size="24" font-weight="500" letter-spacing="0">
