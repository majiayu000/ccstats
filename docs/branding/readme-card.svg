<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="leftShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#02080b" stop-opacity="0.95"/>
      <stop offset="0.46" stop-color="#02080b" stop-opacity="0.72"/>
      <stop offset="0.78" stop-color="#02080b" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#02080b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bottomShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#02080b" stop-opacity="0"/>
      <stop offset="1" stop-color="#02080b" stop-opacity="0.62"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <style>
      .display {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      }
      .mono {
        font-family: "SF Mono", Menlo, Consolas, monospace;
      }
    </style>
  </defs>

  <rect width="1200" height="630" fill="#02080b"/>
  <image href="readme-card-background.png" x="0" y="0" width="1200" height="630" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1200" height="630" fill="url(#leftShade)"/>
  <rect width="1200" height="630" fill="url(#bottomShade)"/>
  <rect x="16" y="16" width="1168" height="598" rx="26" fill="none" stroke="#5ee6ff" stroke-opacity="0.16"/>

  <g filter="url(#softShadow)">
